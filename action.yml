name: MCP Guard Scanner
description: "Scan MCP servers for tool-poisoning and supply-chain risks; fail CI when approved servers change (rug-pull check)."
author: arunmm8335
branding:
  icon: shield
  color: red

inputs:
  mode:
    description: "scan (grade a target) or verify (check the lockfile for drift)"
    required: false
    default: verify
  target:
    description: "Server to scan (scan mode): a path, npm:<package>, or owner/repo"
    required: false
  fail-on:
    description: "scan mode: fail at this grade or worse (A/B/C/D/F)"
    required: false
    default: D
  lockfile:
    description: "verify mode: path to the lockfile"
    required: false
    default: mcpguard.lock.json

runs:
  using: composite
  steps:
    # Build the CLI from this action's own checked-out source so the action is
    # fully self-contained — it does not depend on a published npm package.
    - shell: bash
      run: |
        set -euo pipefail
        cd "$GITHUB_ACTION_PATH"
        npm ci --no-audit --no-fund --silent
        npm run build --silent
    - shell: bash
      run: |
        set -euo pipefail
        CLI="$GITHUB_ACTION_PATH/dist/cli.js"
        if [ "${{ inputs.mode }}" = "scan" ]; then
          if [ -z "${{ inputs.target }}" ]; then
            echo "mcpguard: 'target' is required when mode=scan" >&2
            exit 2
          fi
          node "$CLI" scan "${{ inputs.target }}" --fail-on "${{ inputs.fail-on }}"
        else
          node "$CLI" verify --file "${{ inputs.lockfile }}"
        fi
